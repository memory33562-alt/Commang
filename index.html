const { useState, useEffect, useRef, useMemo } = React;

/* ============================== 로컬 설정/오프라인 저장 ============================== */
const STORE_KEY = "engReaderApp_v2";
const DEFAULT_SETTINGS = { geminiKey:"", geminiModel:"gemini-2.5-flash" };
let memBooks = null, memSettings = null;

function loadLocal(){
  try{
    const r = localStorage.getItem(STORE_KEY);
    if(r){ const d = JSON.parse(r); return { books:d.books||[], settings:{...DEFAULT_SETTINGS, ...(d.settings||{})} }; }
  }catch(e){}
  return { books: memBooks||[], settings: memSettings||{...DEFAULT_SETTINGS} };
}
function saveLocal(books, settings){
  memBooks = books; memSettings = settings;
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({books, settings})); }catch(e){}
}
const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);

/* ============================== 구글 드라이브(Apps Script) 저장 ============================== */
// 저장 주소(고정) — 설정에서 건드리지 않음
const DRIVE_URL = "https://script.google.com/macros/s/AKfycbxyEVOms54jGCfSSOlg3Q-2mblUay_sZ4---_OEpetjzmivC5TyZAYtvK4u3ikgIjw/exec";
// 공유 저장 공간(고정) — 누가 접속해도 같은 데이터를 봅니다
const SPACE_ID = "commang-shared";
async function driveLoad(url, spaceId){
  const u = url + (url.includes("?")?"&":"?") + "spaceId=" + encodeURIComponent(spaceId);
  const res = await fetch(u, { method:"GET" });
  if(!res.ok) throw new Error("불러오기 실패 "+res.status);
  const data = await res.json();
  return Array.isArray(data.books) ? data.books : [];
}
async function driveSave(url, spaceId, books){
  // Content-Type 미지정 → text/plain 처리되어 CORS 사전요청(preflight) 없이 동작
  const res = await fetch(url, { method:"POST", body: JSON.stringify({ spaceId, data:{ books } }) });
  if(!res.ok) throw new Error("저장 실패 "+res.status);
  return res.json().catch(()=>({ok:true}));
}

/* ============================== Google TTS (+브라우저 대체) ============================== */
let gApi = { key:"", voice:"en-US-Neural2-F" };
const ttsCache = new Map();
let _voices = [];
function refreshVoices(){ try{ _voices = window.speechSynthesis.getVoices()||[]; }catch(e){} }
if(window.speechSynthesis){ refreshVoices(); window.speechSynthesis.onvoiceschanged = refreshVoices; }

function browserSpeak(text, rate=0.95){
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text); u.lang="en-US"; u.rate=rate;
    if(!_voices.length) refreshVoices();
    const v = _voices.find(x=>/en[-_]US/i.test(x.lang) && /Google|Samantha|Natural|English/i.test(x.name))
          || _voices.find(x=>/en[-_]US/i.test(x.lang)) || _voices.find(x=>/^en/i.test(x.lang));
    if(v) u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
async function speak(text, rate=1){
  if(!text) return;
  if(gApi.key && text.length < 4800){
    try{
      const ck = gApi.voice+"|"+rate+"|"+text;
      let b64 = ttsCache.get(ck);
      if(!b64){
        const res = await fetch("https://texttospeech.googleapis.com/v1/text:synthesize?key="+encodeURIComponent(gApi.key),{
          method:"POST", headers:{"content-type":"application/json"},
          body: JSON.stringify({
            input:{ text },
            voice:{ languageCode:"en-US", name: gApi.voice },
            audioConfig:{ audioEncoding:"MP3", speakingRate: rate }
          })
        });
        if(!res.ok) throw new Error("tts "+res.status);
        const d = await res.json(); b64 = d.audioContent;
        if(ttsCache.size>120) ttsCache.clear();
        ttsCache.set(ck, b64);
      }
      const audio = new Audio("data:audio/mp3;base64,"+b64);
      await audio.play();
      return;
    }catch(e){ /* 아래 브라우저 발음으로 대체 */ }
  }
  browserSpeak(text, 0.95*rate);
}
const SpeakBtn = ({text, label="🔊", cls=""}) => (
  <button className={"btn text-[var(--accent)] hover:text-[var(--accent2)] "+cls}
    onClick={(e)=>{e.stopPropagation(); speak(text);}} title="미국 발음 듣기">{label}</button>
);

/* ============================== Google STT (받아쓰기) ============================== */
function blobToB64(blob){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=()=>rej(new Error("read")); r.readAsDataURL(blob); });
}
function pickMime(){
  const opts=["audio/webm;codecs=opus","audio/ogg;codecs=opus","audio/webm"];
  for(const m of opts){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m; }
  return "";
}
function useGoogleSTT(){
  const [recording,setRecording]=useState(false);
  const mediaRef=useRef(null), chunksRef=useRef([]), streamRef=useRef(null);
  async function start(onResult, onError){
    const mime = pickMime();
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current = stream;
      const mr = new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
      mediaRef.current = mr; chunksRef.current=[];
      mr.ondataavailable = e=>{ if(e.data.size) chunksRef.current.push(e.data); };
      mr.onstop = async ()=>{
        try{
          const blob = new Blob(chunksRef.current, {type: mime||"audio/webm"});
          const b64 = await blobToB64(blob);
          const enc = (mime.includes("ogg")) ? "OGG_OPUS" : "WEBM_OPUS";
          const res = await fetch("https://speech.googleapis.com/v1/speech:recognize?key="+encodeURIComponent(gApi.key),{
            method:"POST", headers:{"content-type":"application/json"},
            body: JSON.stringify({
              config:{ encoding: enc, languageCode:"en-US", enableAutomaticPunctuation:true, model:"latest_short" },
              audio:{ content: b64 }
            })
          });
          if(!res.ok) throw new Error("stt "+res.status);
          const d = await res.json();
          const t = (((d.results||[])[0]||{}).alternatives||[])[0]?.transcript || "";
          onResult(t);
        }catch(e){ onError && onError(e); }
        finally{ try{ streamRef.current.getTracks().forEach(t=>t.stop()); }catch(_){} setRecording(false); }
      };
      mr.start(); setRecording(true);
    }catch(e){ onError && onError(e); setRecording(false); }
  }
  function stop(){ try{ mediaRef.current && mediaRef.current.stop(); }catch(e){} }
  return { recording, start, stop };
}
function useBrowserSTT(){
  const recRef=useRef(null); const [listening,setListening]=useState(false);
  const supported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  function start(onResult){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR) return;
    const rec=new SR(); recRef.current=rec; rec.lang="en-US"; rec.interimResults=false; rec.maxAlternatives=1;
    rec.onresult=ev=>onResult(ev.results[0][0].transcript);
    rec.onend=()=>setListening(false); rec.onerror=()=>setListening(false);
    setListening(true); rec.start();
  }
  function stop(){ try{ recRef.current && recRef.current.stop(); }catch(e){} setListening(false); }
  return { listening, start, stop, supported };
}
/* 통합: Google 키 있고 녹음 가능하면 Google STT, 아니면 브라우저 */
function useDictation(){
  const g = useGoogleSTT();
  const b = useBrowserSTT();
  const canGoogle = !!gApi.key && !!pickMime() && !!navigator.mediaDevices;
  if(canGoogle){
    return { active:g.recording, supported:true, mode:"google",
      start:(cb)=> g.start(cb, e=> alert("음성 인식 오류: "+(e.message||e))), stop:g.stop };
  }
  return { active:b.listening, supported:b.supported, mode:"browser",
    start:(cb)=> b.start(cb), stop:b.stop };
}

/* ============================== 품사 배지 ============================== */
const POS_COLOR = { "명사":"#3f6f8a","동사":"#a6552f","형용사":"#5b7a3a","부사":"#7a5aa6","전치사":"#8a6a3f","접속사":"#a63f6f","대명사":"#3f8a7a","감탄사":"#8a3f3f","기타":"#6b6258" };
const PosBadge = ({pos}) => { const c=POS_COLOR[pos]||POS_COLOR["기타"];
  return <span className="text-[11px] px-2 py-[2px] rounded-full text-white font-medium" style={{background:c}}>{pos||"기타"}</span>; };

/* ============================== Gemini API (무료) ============================== */
async function callGemini(settings, parts, jsonMode=true, schema=null){
  if(!settings.geminiKey) throw new Error("NO_KEY");
  const model = settings.geminiModel || "gemini-2.5-flash";
  const gc = { temperature:0.1, maxOutputTokens:16384 };
  if(jsonMode){ gc.responseMimeType="application/json"; if(schema) gc.responseSchema=schema; }
  const body = { contents:[{ parts }], generationConfig: gc };
  const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(model)+":generateContent?key="+encodeURIComponent(settings.geminiKey),{
    method:"POST", headers:{ "content-type":"application/json" }, body: JSON.stringify(body)
  });
  if(!res.ok){ const t=await res.text().catch(()=> ""); throw new Error("Gemini "+res.status+": "+t.slice(0,200)); }
  const data = await res.json();
  const cand = (data.candidates||[])[0];
  const text = (((cand||{}).content||{}).parts||[]).map(p=>p.text||"").join("");
  if(!text) throw new Error("빈 응답 (요청 한도 초과나 키 오류일 수 있어요)");
  return text;
}
/* 구조화 출력 스키마 (AI가 형식을 못 틀리게 고정) */
const STR = { type:"string" };
const ANALYSIS_SCHEMA = {
  type:"object",
  properties:{
    rawText: STR,
    incompleteEnding: { type:"boolean" },
    words: { type:"array", items:{ type:"object",
      properties:{
        word:STR, display:STR, pos:STR,
        meanings:{ type:"array", items:STR, minItems:1 },
        examples:{ type:"array", items:{ type:"object", properties:{ en:STR, ko:STR, type:STR }, required:["en","ko"] } }
      },
      required:["word","pos","meanings"]
    } },
    sentences: { type:"array", items:{ type:"object", properties:{ en:STR, ko:STR }, required:["en","ko"] } },
    phrases: { type:"array", items:{ type:"object",
      properties:{
        phrase:STR, meaning:STR, explanation:STR,
        nativeExamples:{ type:"array", items:{ type:"object", properties:{ en:STR, ko:STR }, required:["en","ko"] } }
      },
      required:["phrase","meaning"]
    } }
  },
  required:["rawText","words","sentences"]
};
const CORRECTION_SCHEMA = { type:"object", properties:{ ok:{ type:"boolean" }, corrected:STR, feedback:STR }, required:["corrected","feedback"] };
function parseJSON(text){
  let s=text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const a=s.indexOf("{"),b=s.lastIndexOf("}"); if(a>=0&&b>a) s=s.slice(a,b+1);
  try{ return JSON.parse(s); }catch(e){}
  // 흔한 오류 보정: 트레일링 콤마 제거 후 재시도
  try{ return JSON.parse(s.replace(/,(\s*[}\]])/g,"$1")); }catch(e){}
  return null;
}
// JSON 응답을 받되, 형식이 깨지면 자동으로 다시 시도
async function callGeminiJSON(settings, parts, schema=null, retries=2){
  let lastErr;
  for(let i=0;i<=retries;i++){
    try{
      const txt = await callGemini(settings, parts, true, schema);
      const parsed = parseJSON(txt);
      if(parsed) return parsed;
      lastErr = new Error("AI 응답 형식 오류 (자동 재시도했어요)");
    }catch(e){
      if(e.message==="NO_KEY") throw e;
      lastErr = e;
    }
    if(i<retries) await new Promise(r=>setTimeout(r, 900));
  }
  throw lastErr || new Error("분석 실패");
}
function fileToBase64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=()=>rej(new Error("read")); r.readAsDataURL(file); }); }
// 사진을 보내기 전에 적당한 크기·JPEG로 변환 (폰 고화질/HEIC/PNG 모두 대응)
function loadImageEl(file){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{ URL.revokeObjectURL(url); res(img); };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error("이미지 디코드 실패")); };
    img.src=url;
  });
}
async function prepImage(file, maxDim=2000, quality=0.85){
  try{
    const img=await loadImageEl(file);
    let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
    if(!w||!h) throw new Error("크기 0");
    const scale=Math.min(1, maxDim/Math.max(w,h));
    w=Math.round(w*scale); h=Math.round(h*scale);
    const c=document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    const b64=c.toDataURL("image/jpeg",quality).split(",")[1];
    if(!b64) throw new Error("변환 실패");
    return { data:b64, mediaType:"image/jpeg" };
  }catch(e){
    const b64=await fileToBase64(file);
    return { data:b64, mediaType:file.type||"image/jpeg" };
  }
}

function analysisPrompt(prevTail){
  return `당신은 영어 회화 학습 튜터입니다. 학습자는 CEFR A2 수준이며 목표는 회화(스피킹) 향상입니다 (문법 시험 X, 토익/수능 X).
업로드된 영어 원서 페이지 이미지를 읽고, 회화 학습에 맞게 정리하세요. 반드시 아래 JSON만 출력하세요. 설명·인사·마크다운 백틱 금지, 순수 JSON만.
${prevTail ? `\n[이전 페이지 마지막 부분 — 문장이 이어질 수 있음]: "${prevTail}"\n이미지의 첫 문장이 위 내용에서 이어지면 합쳐서 한 문장으로 정리하세요.\n` : ""}
JSON 스키마:
{
 "rawText":"이미지에서 읽은 영어 원문 전체(문장 순서대로)",
 "incompleteEnding": true 또는 false,
 "words":[ {"word":"원형","display":"본문 형태","pos":"명사/동사/형용사/부사/전치사/접속사/대명사/감탄사/기타","meanings":["자주 쓰는 뜻 모두(한국어)"],"examples":[{"en":"평서문","ko":"번역","type":"평서문"},{"en":"의문문","ko":"번역","type":"의문문"}]} ],
 "sentences":[ {"en":"영어 원본 문장","ko":"한국어 번역"} ],
 "phrases":[ {"phrase":"구문 패턴(예: as 원급 as, used to)","meaning":"한국어 의미","explanation":"회화 활용 설명(한국어)","nativeExamples":[{"en":"원어민 표현","ko":"한국어"}]} ]
}
규칙:
- words: A2에게 유용하거나 모를 만한 단어 위주(쉬운 기능어 제외). **모든 단어는 meanings에 한국어 뜻을 최소 1개 이상 반드시 채우세요(절대 빈칸 금지).** 자주 쓰는 뜻은 빠짐없이. 단어가 5개 이상 나오도록 충분히 뽑으세요.
- examples: 평서문/의문문 번갈아, 회화에서 바로 쓸 자연스러운 문장.
- 모든 한국어 번역(examples의 ko, sentences의 ko 포함)은 **자연스러운 한국어로 의역**하세요. 영어 어순을 그대로 옮긴 어색한 직역·기계번역 말투를 절대 쓰지 마세요. 'you'를 무조건 '너/당신'으로 옮기지 말고, 한국어에서 자연스럽게(주어 생략 등) 표현하세요. 말투는 기본적으로 **부드러운 존댓말(해요체)**로 통일하되, 한국 사람이 실제로 말하듯 자연스럽게 다듬으세요.
- sentences: 원문을 한 문장씩 끊어 영어→자연스러운 한국어.
- phrases: **반드시 2개 이상(가능하면 3~5개) 추출**하세요. 회화에서 자주 쓰거나 A2 학습자가 이해하기 어려운 패턴 위주(예: used to, be surrounded by, row upon row of, the next thing you know, as ... as, full of 등). 본문에 그런 표현이 있으면 빼먹지 말고, 원어민 실제 표현(nativeExamples)을 함께 넣으세요. 정말 하나도 없을 때만 빈 배열로 두세요.`;
}

  async function analyze(){
    if(!settings.geminiKey){ onNeedKey(); return; }
    if(!files.length){ setError("사진을 1~3장 선택하세요."); return; }

function buildPool(books, scope, bookId){
  const src = scope==="all" ? books : books.filter(b=>b.id===bookId);
  const words=[],phrases=[],sentences=[]; const sw=new Set(),sp=new Set();
  src.forEach(b=>b.entries.forEach(e=>{
    (e.words||[]).forEach(w=>{ const k=(w.word||"").toLowerCase(); if(k&&!sw.has(k)){ sw.add(k); words.push(w); } });
    (e.phrases||[]).forEach(p=>{ const k=(p.phrase||"").toLowerCase(); if(k&&!sp.has(k)){ sp.add(k); phrases.push(p); } });
    (e.sentences||[]).forEach(s=>{ if(s.en) sentences.push(s); });
  }));
  return {words,phrases,sentences};
}
const shuffle = a=>{ const r=[...a]; for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; } return r; };

function FlashRunner({items,total,renderFront,renderBack,frontSpeak,backSpeak,qText,aText,aSpeak,onDone,label}){
  const deck=useMemo(()=>shuffle(items).slice(0,total),[items,total]);
  const [i,setI]=useState(0); const [show,setShow]=useState(false); const [results,setResults]=useState([]);
  const cur=deck[i];
  useEffect(()=>{ if(show && backSpeak && cur) speak(backSpeak(cur)); }, [show, i]);
  if(deck.length===0) return <p className="text-sm text-[var(--ink2)]">복습할 항목이 없습니다.</p>;
  if(i>=deck.length){
    const correct=results.filter(r=>r.correct).length;
    const wrong=results.filter(r=>!r.correct);
    return (
      <div className="fade">
        <div className="text-center mb-5">
          <p className="serif text-2xl font-bold mb-1">완료! 🎉</p>

                    <p className="serif font-bold">{aText?aText(r.item):""}</p>
                  </div>
                  {aSpeak && <SpeakBtn text={aSpeak(r.item)} label="🔊" cls="shrink-0" />}
                </div>
              ))}
            </div>
          </div>
        ) : <p className="text-center text-[var(--good)] font-bold mb-5">전부 맞았어요! 완벽해요 👏</p>}
        <div className="text-center"><Btn onClick={onDone}>복습 메뉴로</Btn></div>
      </div>
    );
  }
  function mark(ok){ setResults(rs=>[...rs,{item:cur,correct:ok}]); setShow(false); setI(i+1); }
  return (
    <div className="fade">
      <div className="flex justify-between text-xs text-[var(--ink2)] mb-2"><span>{label}</span><span>{i+1} / {deck.length}</span></div>
      <div className="h-2 bg-[var(--paper2)] rounded-full mb-4 overflow-hidden"><div className="h-full bg-[var(--accent)]" style={{width:`${(i/deck.length)*100}%`}} /></div>
      <div className="card rounded-2xl p-6 min-h-[180px] flex flex-col items-center justify-center text-center">
        <div className="mb-4">{renderFront(cur)}</div>
        {frontSpeak && <SpeakBtn text={frontSpeak(cur)} label="🔊 발음 듣기" cls="text-sm mb-2" />}
        {show ? <div className="mt-3 pt-3 border-t border-[var(--line)] w-full fade">{renderBack(cur)}</div>
              : <Btn kind="soft" className="mt-2" onClick={()=>setShow(true)}>정답 확인</Btn>}
      </div>
      {show && <div className="flex gap-2 justify-center mt-4">
        <Btn kind="danger" onClick={()=>mark(false)}>❌ 틀렸어요</Btn>
        <Btn kind="good" onClick={()=>mark(true)}>✅ 맞았어요</Btn>
      </div>}
    </div>
  );
}

          <div className="mt-4 pt-4 border-t border-[var(--line)] fade">
            <p className={"text-sm font-bold "+(feedback.ok?"text-[var(--good)]":"text-[var(--warn)]")}>{feedback.ok?"👍 잘했어요":"✍️ 이렇게 고쳐보세요"}</p>
            <div className="mt-2 text-sm"><span className="text-[var(--ink2)]">교정: </span><span className="serif">{feedback.corrected}</span><SpeakBtn text={feedback.corrected} cls="ml-1" /></div>
            <p className="text-xs text-[var(--ink2)] mt-2">{feedback.feedback}</p>
            <p className="text-xs text-[var(--ink2)] mt-2">원서 원문: <span className="serif">{cur.en}</span> <SpeakBtn text={cur.en} cls="text-xs"/></p>
            <Btn className="mt-3" onClick={next}>다음 →</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================== Review 메인 ============================== */
function Review({books,currentBookId,settings,onBack,onNeedKey}){
  const [scope,setScope]=useState(currentBookId?"book":"all");
  const [type,setType]=useState(null); const [mode,setMode]=useState(null);
  const pool=useMemo(()=>buildPool(books,scope,currentBookId),[books,scope,currentBookId]);
  const curBook=books.find(b=>b.id===currentBookId);
  function reset(){ setType(null); setMode(null); }
  if(type==="words"&&mode){
    return (
      <ReviewShell title="단어 복습 · 30개" onBack={reset}>
        {mode==="ko2en" && <FlashRunner items={pool.words} total={30} label="한글 → 영어" backSpeak={w=>w.word}
          qText={w=>(w.meanings||[]).join(", ")} aText={w=>w.word} aSpeak={w=>w.word}
          renderFront={w=><div><p className="text-xs text-[var(--ink2)] mb-1">이 뜻의 영어 단어는?</p><p className="serif text-2xl font-bold">{(w.meanings||[]).join(", ")}</p><p className="text-xs mt-1"><PosBadge pos={w.pos}/></p></div>}
          renderBack={w=><div><p className="serif text-2xl font-bold">{w.word}</p><SpeakBtn text={w.word} label="🔊 발음 듣기" cls="text-sm mt-1"/></div>} />}
        {mode==="en2ko" && <FlashRunner items={pool.words} total={30} label="영어 → 한글" frontSpeak={w=>w.word}
          qText={w=>w.word} aText={w=>(w.meanings||[]).join(", ")} aSpeak={w=>w.word}
          renderFront={w=><div><p className="serif text-2xl font-bold">{w.word}</p><p className="text-xs mt-1"><PosBadge pos={w.pos}/></p></div>}
          renderBack={w=><p className="text-lg">{(w.meanings||[]).join(", ")}</p>} />}
        {mode==="listen" && <ListenChoice words={pool.words} total={30} onDone={reset} />}
      </ReviewShell>
    );
  }
  if(type==="phrases"&&mode){
    const flat=[]; pool.phrases.forEach(p=>(p.nativeExamples||[]).forEach(ex=>flat.push({...ex,phrase:p.phrase})));
    return (
      <ReviewShell title="구문 복습 · 20개" onBack={reset}>
        {mode==="ko2en" && <FlashRunner items={pool.phrases} total={20} label="한글 → 영어" backSpeak={p=>p.phrase}
          qText={p=>p.meaning} aText={p=>p.phrase} aSpeak={p=>p.phrase}
          renderFront={p=><div><p className="text-xs text-[var(--ink2)] mb-1">이 뜻의 영어 구문은?</p><p className="serif text-xl font-bold">{p.meaning}</p></div>}
          renderBack={p=><div><p className="serif text-xl font-bold">{p.phrase}</p>{(p.nativeExamples||[]).map((ex,k)=><p key={k} className="text-sm mt-1">{ex.en} <SpeakBtn text={ex.en} cls="text-xs"/> <span className="text-[var(--ink2)]">— {ex.ko}</span></p>)}</div>} />}
        {mode==="en2ko" && <FlashRunner items={pool.phrases} total={20} label="영어 → 한글" frontSpeak={p=>p.phrase}
          qText={p=>p.phrase} aText={p=>p.meaning} aSpeak={p=>p.phrase}
          renderFront={p=><p className="serif text-xl font-bold">{p.phrase}</p>}
          renderBack={p=><div><p className="text-base">{p.meaning}</p>{p.explanation&&<p className="text-xs text-[var(--ink2)] mt-1">{p.explanation}</p>}</div>} />}
        {mode==="apply" && <FlashRunner items={flat} total={20} label="원어민 표현 ↔ 뜻" frontSpeak={x=>x.en}
          qText={x=>x.en} aText={x=>x.ko} aSpeak={x=>x.en}
          renderFront={x=><div><p className="text-xs text-[var(--ink2)] mb-1">[{x.phrase}] 이 표현의 뜻은?</p><p className="serif text-xl font-bold">{x.en}</p></div>}
          renderBack={x=><p className="text-lg">{x.ko}</p>} />}
      </ReviewShell>
    );
  }
  if(type==="sentences"){
    return <ReviewShell title="문장 만들기 · 15개" onBack={reset}><SentenceMaker sentences={pool.sentences} total={15} settings={settings} onDone={reset} onNeedKey={onNeedKey} /></ReviewShell>;
  }
  return (
    <div className="fade">
      <button className="text-sm text-[var(--ink2)] hover:text-[var(--ink)] mb-4" onClick={onBack}>← 돌아가기</button>
      <h2 className="serif text-2xl font-bold mb-1">🔁 Review</h2>
      <p className="text-xs text-[var(--ink2)] mb-5">Step 4 · 누적 복습으로 회화 실력을 다집니다</p>
      <Section title="복습 범위" emoji="🎯">
        <div className="flex gap-2 flex-wrap">
          <button onClick={()=>setScope("book")} disabled={!curBook} className={"btn px-4 py-2 rounded-lg text-sm border "+(scope==="book"?"bg-[var(--accent)] text-white border-[var(--accent)]":"border-[var(--line)]")}>이 원서만{curBook?` (${curBook.title})`:""}</button>
          <button onClick={()=>setScope("all")} className={"btn px-4 py-2 rounded-lg text-sm border "+(scope==="all"?"bg-[var(--accent)] text-white border-[var(--accent)]":"border-[var(--line)]")}>모든 원서 (누적복습)</button>
        </div>
        <p className="text-xs text-[var(--ink2)] mt-2">단어 {pool.words.length} · 구문 {pool.phrases.length} · 문장 {pool.sentences.length}</p>
      </Section>
      <Section title="무엇을 연습할까요?" emoji="✏️">
        <div className="grid gap-3 sm:grid-cols-3">
          <MenuCard active={type==="words"} title="단어" desc="1회 30개" emoji="🔤" onClick={()=>{setType("words"); setMode(null);}} />
          <MenuCard active={type==="phrases"} title="구문" desc="1회 20개" emoji="🧩" onClick={()=>{setType("phrases"); setMode(null);}} />
          <MenuCard active={type==="sentences"} title="문장 만들기" desc="1회 15개" emoji="🗣️" onClick={()=>{setType("sentences"); setMode(null);}} />
        </div>
      </Section>
      {type==="words" && <Section title="단어 연습 방식" emoji="🔤"><div className="grid gap-2 sm:grid-cols-3">
        <ModeBtn onClick={()=>setMode("ko2en")} title="한글 → 영어" desc="영어로 말해보고 확인 (확인 후 발음)" />
        <ModeBtn onClick={()=>setMode("en2ko")} title="영어 → 한글" desc="뜻 맞추기 (처음부터 발음)" />
        <ModeBtn onClick={()=>setMode("listen")} title="발음만 듣기" desc="듣고 뜻 고르기 (선택형)" />
      </div></Section>}
      {type==="phrases" && <Section title="구문 연습 방식" emoji="🧩"><div className="grid gap-2 sm:grid-cols-3">
        <ModeBtn onClick={()=>setMode("ko2en")} title="한글 → 영어" desc="영어로 말해보고 확인" />
        <ModeBtn onClick={()=>setMode("en2ko")} title="영어 → 한글" desc="뜻 말해보고 확인 (발음)" />
        <ModeBtn onClick={()=>setMode("apply")} title="원어민 표현 ↔ 뜻" desc="실제 표현 보고 반대로 맞추기" />
      </div></Section>}
      {type==="sentences" && <Section title="문장 만들기" emoji="🗣️">
        <p className="text-sm text-[var(--ink2)] mb-3">한국어 뜻을 보고 영어로 말하면(또는 입력), 원어민이 쓸 법한 자연스러운 표현으로 교정하고 발음·인토네이션까지 들려줍니다.</p>
        <Btn onClick={()=>setMode("go")}>시작하기</Btn>
      </Section>}
    </div>
  );
}
const MenuCard=({active,title,desc,emoji,onClick})=>(<button onClick={onClick} className={"btn card rounded-xl p-4 text-left "+(active?"ring-2 ring-[var(--accent)]":"")}><div className="text-2xl mb-1">{emoji}</div><div className="font-bold">{title}</div><div className="text-xs text-[var(--ink2)]">{desc}</div></button>);
const ModeBtn=({title,desc,onClick})=>(<button onClick={onClick} className="btn text-left border border-[var(--line)] rounded-lg p-3 hover:bg-[var(--paper2)]"><div className="font-medium text-sm">{title}</div><div className="text-xs text-[var(--ink2)] mt-1">{desc}</div></button>);
const ReviewShell=({title,onBack,children})=>(<div className="fade"><button className="text-sm text-[var(--ink2)] hover:text-[var(--ink)] mb-3" onClick={onBack}>← 복습 메뉴</button><h2 className="serif text-xl font-bold mb-4">{title}</h2>{children}</div>);

/* ============================== App (구글 드라이브 저장) ============================== */
function App(){
  const init = loadLocal();
  const [settings,setSettings]=useState(init.settings);
  const [books,setBooks]=useState(init.books);
  const [screen,setScreen]=useState("home");
  const [currentBookId,setCurrentBookId]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [sync,setSync]=useState("local"); // local / loading / saving / saved / error

  const booksRef=useRef(books), settingsRef=useRef(settings), lastSyncedRef=useRef(JSON.stringify(books)), saveTimer=useRef(null), loadedRef=useRef(false);
  useEffect(()=>{ booksRef.current=books; },[books]);
  useEffect(()=>{ settingsRef.current=settings; },[settings]);
  useEffect(()=>{ gApi.key=settings.googleKey||""; gApi.voice=settings.voice||"en-US-Neural2-F"; },[settings.googleKey, settings.voice]);
  useEffect(()=>{ saveLocal(booksRef.current, settings); },[settings]);

  const cloudReady = true; // 항상 공유 저장 공간 사용

  async function reload(){
    setSync("loading");
    try{
      const remote = await driveLoad(DRIVE_URL, SPACE_ID);
      if(remote.length===0 && booksRef.current.length>0){
        lastSyncedRef.current = JSON.stringify(booksRef.current);
        loadedRef.current = true;
        await driveSave(DRIVE_URL, SPACE_ID, booksRef.current);
        setSync("saved"); return;
      }
      lastSyncedRef.current = JSON.stringify(remote);
      loadedRef.current = true;
      setBooks(remote);
      setSync("saved");
    }catch(e){ setSync("error"); }
  }

  // 앱을 열면 공유 저장 내용을 자동으로 불러옴
  useEffect(()=>{ reload(); }, []);

  // books 변경 → 로컬 저장 + 드라이브 자동 저장(디바운스)
  useEffect(()=>{
    saveLocal(books, settingsRef.current);
    const js = JSON.stringify(books);
    if(js===lastSyncedRef.current) return;
    if(!loadedRef.current) return; // 첫 불러오기 전엔 저장 안 함(덮어쓰기 방지)
    lastSyncedRef.current = js;
    setSync("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async ()=>{
      try{ await driveSave(DRIVE_URL, SPACE_ID, books); setSync("saved"); }
      catch(e){ setSync("error"); }
    }, 800);
  },[books]);

  const update=fn=>setBooks(prev=>{ const n=structuredClone(prev); fn(n); return n; });
  function createBook(title){ update(n=> n.unshift({id:uid(),title,createdAt:Date.now(),entries:[]})); }
  function deleteBook(id){ update(n=>{ const i=n.findIndex(b=>b.id===id); if(i>=0) n.splice(i,1); }); }
  function addEntry(entry){ update(n=>{ const b=n.find(x=>x.id===currentBookId); if(b) b.entries.push(entry); }); setScreen("book"); }
  function deleteEntry(eid){ update(n=>{ const b=n.find(x=>x.id===currentBookId); if(b) b.entries=b.entries.filter(e=>e.id!==eid); }); }

  const currentBook=books.find(b=>b.id===currentBookId);
  const syncLabel = {local:"이 기기 저장", loading:"불러오는 중…", saving:"저장 중…", saved:"☁ 저장됨", error:"⚠ 연결 확인"}[sync];
  const syncGreen = sync==="saved";

  return (
    <div className="min-h-screen">
      <header className="border-b border-[var(--line)] bg-[var(--paper)]/90 backdrop-blur sticky top-0 z-30">
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
          <button className="text-left" onClick={()=>{setScreen("home"); setCurrentBookId(null);}}>
            <span className="serif text-lg font-bold">원서 회화 노트</span>
            <span className="text-[11px] text-[var(--ink2)] ml-2 hidden sm:inline">English Reading Studio</span>
          </button>
          <div className="flex items-center gap-2 text-sm">
            <span className="text-[11px] px-2 py-1 rounded-full" style={{background: syncGreen?"#e8f1ea":"#efe7d6", color: syncGreen?"#3f7d50":"#5c544a"}}>{syncLabel}</span>
            {cloudReady && <button className="btn text-xs underline" onClick={reload} title="다른 기기에서 저장한 내용 가져오기">↻ 불러오기</button>}
            <button className="btn px-2 py-1 rounded hover:bg-[var(--paper2)]" onClick={()=>setShowSettings(true)}>⚙️</button>
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-4 py-6">
        {!settings.geminiKey && screen==="home" && (
          <div className="card rounded-lg p-3 mb-5 text-xs text-[var(--ink2)] flex items-center justify-between gap-2">
            <span>💡 ⚙️ 설정에서 Gemini API 키만 넣으면 시작! (무료) 공부 내용은 자동 저장·공유되고, 발음·받아쓰기도 그냥 무료로 작동합니다.</span>
            <Btn kind="soft" onClick={()=>setShowSettings(true)}>설정</Btn>
          </div>
        )}
        {screen==="home" && <Home books={books} onCreate={createBook} onDelete={deleteBook} onOpen={id=>{setCurrentBookId(id); setScreen("book");}} />}
        {screen==="book" && currentBook && <BookView book={currentBook} onBack={()=>{setScreen("home"); setCurrentBookId(null);}} onAdd={()=>setScreen("add")} onReview={()=>setScreen("review")} onDeleteEntry={deleteEntry} />}
        {screen==="add" && currentBook && <AddPages book={currentBook} settings={settings} onSaved={addEntry} onBack={()=>setScreen("book")} onNeedKey={()=>setShowSettings(true)} />}
        {screen==="review" && <Review books={books} currentBookId={currentBookId} settings={settings} onBack={()=>setScreen(currentBook?"book":"home")} onNeedKey={()=>setShowSettings(true)} />}
      </main>

      {showSettings && <Settings settings={settings} onClose={()=>setShowSettings(false)} onSave={s=>{ setSettings(s); setShowSettings(false); }} />}

      <footer className="max-w-3xl mx-auto px-4 py-8 text-center text-[11px] text-[var(--ink2)]">
        원서 데이터는 구글 드라이브에 자동 저장됩니다 · 키는 각 기기에만 보관됩니다
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
